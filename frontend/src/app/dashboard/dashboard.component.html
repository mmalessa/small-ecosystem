<div class="dashboard-container">
  <h2>Dashboard</h2>
  <div class="actions">
    <button (click)="pingEcho()" [disabled]="loading">
      {{ loading ? 'Pinging...' : 'Ping Echo' }}
    </button>
    <button (click)="logout()" class="logout-btn">Logout</button>
  </div>
  @if (echoError) {
    <div class="error">{{ echoError }}</div>
  }
  @if (echoResponse) {
    <h3>Echo Response</h3>
    <pre>{{ echoResponse | json }}</pre>
  }
</div>
